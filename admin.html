<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NEU Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center gap-4">
                <img src="logo.png" alt="NEU Logo" class="w-12 h-12 object-contain">
                <h1 class="text-3xl font-bold text-blue-900">Library Admin Dashboard</h1>
            </div>
            
            <div class="flex items-center gap-2">
                <a href="index.html?mode=user" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 transition">
                    Switch to User
                </a>
                <button id="logout-btn" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600 transition">
                    Logout
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Total Visits</h3>
                <p id="total-visits-count" class="text-3xl font-bold text-blue-900 mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Top College</h3>
                <p id="top-college-name" class="text-xl font-bold text-green-900 mt-2">-</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-yellow-500">
                <h3 class="text-gray-500 text-sm font-semibold uppercase">Top Purpose</h3>
                <p id="top-purpose-name" class="text-xl font-bold text-yellow-900 mt-2">-</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-lg shadow-md mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <input type="text" id="search-input" placeholder="Search by email..." class="w-full md:w-1/2 border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <select id="date-filter" class="w-full md:w-1/4 border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="all">All Time</option>
                <option value="today">Today</option>
                <option value="week">This Week</option>
                <option value="month">This Month</option>
            </select>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">Recent Visits</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full table-auto text-left">
                    <thead class="bg-gray-200 text-gray-700">
                        <tr>
                            <th class="px-4 py-2 rounded-tl">Date & Time</th>
                            <th class="px-4 py-2">Email</th>
                            <th class="px-4 py-2">College</th>
                            <th class="px-4 py-2">Purpose</th>
                            <th class="px-4 py-2 rounded-tr">Action</th>
                        </tr>
                    </thead>
                    <tbody id="visits-table-body" class="text-gray-600">
                        <tr>
                            <td colspan="5" class="text-center py-4">Loading data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
